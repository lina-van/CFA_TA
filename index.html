<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requisition complexity Assessment</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#FFFFFF;--surface:#FFFFFF;--border:#DAD7D2;--text:#1a1714;--muted:#5B6770;
    --primary:#DD0033;--navy:#004F71;
    --standard:#00635B;--moderate:#E35205;--complex:#DD0033;
    --standard-bg:#e6f5f4;--moderate-bg:#fdf0e6;--complex-bg:#fde8ec;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  }
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:8px 16px;overflow:hidden}  .wrap{max-width:2000px;margin:0 auto}
.page-header p{font-size:12px;color:var(--muted)}
  .eyebrow{font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--primary);margin-bottom:6px}
  .page-header h1{font-size:24px;font-weight:600;line-height:1.0;color:var(--navy);margin-bottom:4px}
  .page-header p{font-size:18px;color:var(--muted)}

  .score-bar{background:#f7f9fc;border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .score-meta{flex:1;min-width:140px}
  .score-label{font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .score-answered{font-size:14px;color:var(--muted);margin-top:4px}
  .badge{padding:9px 100px;border-radius:8px;font-size:18px;font-weight:600;letter-spacing:.04em;transition:all .3s;white-space:nowrap}
  .badge.standard{background:var(--standard-bg);color:var(--standard)}
  .badge.moderate{background:var(--moderate-bg);color:var(--moderate)}
  .badge.complex{background:var(--complex-bg);color:var(--complex)}
  .badge.pending{background:var(--border);color:var(--muted)}

  

  .layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;align-items:start}
  @media(max-width:700px){.layout{grid-template-columns:1fr}}
  .left-col{display:flex;flex-direction:column;gap:14px}

  .pane{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .pane-header{padding:9px 14px;display:flex;align-items:center;gap:8px;font-size:18px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#fff}
  .pane-header.pos{background:var(--navy)}
  .pane-header.neg{background:var(--standard)}

.q-row{display:grid;grid-template-columns:1fr auto 36px;align-items:center;padding:6px 14px;border-bottom:1px solid var(--border);gap:8px;transition:background .12s}
  .q-row:last-child{border-bottom:none}
  .q-row:hover{background:#faf8f5}
  .q-row.a-pos{background:#fef4f5}
  .q-row.a-neg{background:#eef8f6}
  .q-row.a-no{background:#fafafa}
  .q-text{font-size:16px;color:var(--text);line-height:1.0}
  .tog{display:flex;gap:5px}
  .tb{padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:var(--font);font-size:18px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
  .tb:hover{border-color:#999;color:var(--text)}
  .tb.yes.ap{background:var(--primary);border-color:var(--primary);color:#fff}
  .tb.yes.an{background:var(--standard);border-color:var(--standard);color:#fff}
  .tb.no.ac{background:var(--navy);border-color:var(--navy);color:#fff}
  .pts{text-align:center;font-size:18px;font-weight:600;color:var(--muted)}
  .pts.pos{color:var(--primary)}
  .pts.neg{color:var(--standard)}

  .reset-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:8px 15px;font-family:var(--font);font-size:18px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;width:100%}
  .reset-btn:hover{border-color:var(--primary);color:var(--primary)}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <h1>Requisition Complexity Assessment</h1>
    <p>Answer each question below to calculate this requisition's complexity level.</p>
  </div>

  <div class="score-bar">
    <div class="score-meta">
      <div class="score-label">complexity Rating</div>
      <div class="score-answered" id="answered-count">0 of 16 answered</div>
    </div>
    <div class="badge pending" id="badge">Pending</div>
  </div>

  <button class="reset-btn" style="margin-bottom:16px" onclick="resetAll()">↺ Reset all responses</button>

  <div class="layout">
    <div class="left-col">
      <div class="pane">
        <div class="pane-header pos"><span>Complexity factors</span></div>
        <div id="general-pos-q"></div>
      </div>
      <div class="pane">
        <div class="pane-header pos"><span>Skills and talent pool</span></div>
        <div id="skills-q"></div>
      </div>
    </div>
    <div class="pane">
      <div class="pane-header neg"><span>Favorable factors</span></div>
      <div id="neg-q"></div>
    </div>
  </div>
</div>

<script>
const skillsSet=new Set([
  "Does the role require hard-to-verify skills or credentials?",
  "Is this role competing internally with other priority requisitions for similar talent?",
  "Is there a specialized skill evaluation? (case study, field test, etc.)",
  "Does the role require specialized or niche sourcing?",
  "Does the role require a degree in a specific field and/or specific certification?",
]);
const posQ=[
  "Is there a history of this role being difficult to fill?",
  "Does the role require specialized or niche sourcing?",
  "Are multiple stakeholders involved in the decision-making?",
  "Would delay in filling this role cause major business impact?",
  "Has the role been open longer than 6 months?",
  "Has the role been open longer than 9 months?",
  "Is the role for an executive office/family office?",
  "Does the role require hard-to-verify skills or credentials?",
  "Is this role competing internally with other priority requisitions for similar talent?",
  "Is there a specialized skill evaluation? (case study, field test, etc.)",
  "Does the role require a degree in a specific field and/or specific certification?",
];
const negQ=[
  "Is this a pipeline role?",
  "Is the talent pool plentiful and easy to source?",
  "Are the role requirements clear and stable?",
  "Do we have contractors that could fill in as we work on the requisition?",
  "Is there a talent community for this role?",
  "Is there an internal candidate identified as a strong fit for this role?",
];
const questions=[
  ...posQ.map(t=>({text:t,yes:1,no:0,group:skillsSet.has(t)?'skills':'pos'})),
  ...negQ.map(t=>({text:t,yes:-1,no:0,group:'neg'})),
];
let responses=new Array(questions.length).fill(null);

function renderGroup(elId,gKey){
  const c=document.getElementById(elId);c.innerHTML='';
  questions.forEach((q,i)=>{
    if(q.group!==gKey)return;
    const ans=responses[i];
    const pts=ans===null?'—':ans==='yes'?q.yes:q.no;
    const ptsClass=pts==='—'?'':pts>0?'pos':pts<0?'neg':'';
    const rowClass=ans===null?'':ans==='yes'?(q.yes>0?'a-pos':'a-neg'):'a-no';
    const yAC=ans==='yes'?(q.yes>0?'ap':'an'):'';
    const nAC=ans==='no'?'ac':'';
    const row=document.createElement('div');
    row.className='q-row '+rowClass;
    row.innerHTML=`<div class="q-text">${q.text}</div>
      <div class="tog">
        <button class="tb yes ${yAC}" onclick="answer(${i},'yes')">Yes</button>
        <button class="tb no ${nAC}" onclick="answer(${i},'no')">No</button>
      </div>
      <div class="pts ${ptsClass}">${pts===0?'0':pts}</div>`;
    c.appendChild(row);
  });
}

function render(){
  renderGroup('general-pos-q','pos');
  renderGroup('skills-q','skills');
  renderGroup('neg-q','neg');
  updateSummary();
}

function answer(i,val){
  responses[i]=responses[i]===val?null:val;
  render();
}

function updateSummary(){
  const answered=responses.filter(r=>r!==null).length;
  const score=responses.reduce((s,r,i)=>{
    if(r===null)return s;
    return s+(r==='yes'?questions[i].yes:questions[i].no);
  },0);
  const bEl=document.getElementById('badge');
  const cEl=document.getElementById('answered-count');
  cEl.textContent=`${answered} of ${questions.length} answered`;
  if(!answered){bEl.textContent='Pending';bEl.className='badge pending';return;}
  if(score<=0){bEl.className='badge standard';bEl.textContent='Standard';}
  else if(score<=4){bEl.className='badge moderate';bEl.textContent='Moderate';}
  else{bEl.className='badge complex';bEl.textContent='Complex';}
}

function resetAll(){responses=new Array(questions.length).fill(null);render();}
render();
</script>
</body>
</html>
